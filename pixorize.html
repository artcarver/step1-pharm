<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:wght@400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <title>Pixorize Tracker — Step 1</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body data-resource="pixorize">

<div class="header">
  <div class="header-inner">
    <a href="index.html" class="back-link">← Back to Hub</a>
    <h1 class="brand-title">Pixorize Tracker</h1>
    <p class="brand-sub"><span id="header-remaining">0</span> remaining &nbsp;·&nbsp; 32h 37m total content</p>

    <div class="stats-row" style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
      <div class="stat-chip" style="background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border);">
        <div class="num" style="color:var(--t1); font-weight: 700; font-size: 18px;" id="chip-p1">0</div>
        <div class="lbl" style="font-size: 10px; text-transform: uppercase;">Must Know</div>
      </div>
      <div class="stat-chip" style="background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border);">
        <div class="num" style="color:var(--t2); font-weight: 700; font-size: 18px;" id="chip-p2">0</div>
        <div class="lbl" style="font-size: 10px; text-transform: uppercase;">High Yield</div>
      </div>
      <div class="stat-chip" style="background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border);">
        <div class="num" style="color:var(--t3); font-weight: 700; font-size: 18px;" id="chip-p3">0</div>
        <div class="lbl" style="font-size: 10px; text-transform: uppercase;">Solid Yield</div>
      </div>
      <div class="stat-chip" style="background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border);">
        <div class="num" style="color:var(--green); font-weight: 700; font-size: 18px;" id="header-completed">0 / 0</div>
        <div class="lbl" style="font-size: 10px; text-transform: uppercase;">Completed</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">Dashboard</button>
    </div>
  </div>
</div>

<div class="content" style="max-width: 1200px; margin: 30px auto; padding: 0 20px;">
  <div id="tab-all" class="tab-panel active">
    <div id="main-content"></div>
  </div>
</div>

<script src="study_data.js"></script>

<script src="tracker_logic.js"></script>

<script>
  // Replace these values with your actual Firebase project settings from your original file
  const firebaseConfig = {
    apiKey: "AIzaSyBBzOGRAhCD5AOnHnAN47q-j_coCMx2buo",
    authDomain: "sketchy-tracker.firebaseapp.com",
    projectId: "sketchy-tracker",
    storageBucket: "sketchy-tracker.firebasestorage.app",
    messagingSenderId: "970470066509",
    appId: "1:970470066509:web:14c7300fb1dd882a038f04",
    measurementId: "G-2KVBCP4THR"
  };

  // Start the engine
  initTracker(firebaseConfig);
</script>

</body>
</html>
